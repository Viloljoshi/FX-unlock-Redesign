<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="IC Trading">
  <!-- rounded-corner black square base — matches the IC Markets brand silhouette -->
  <rect x="0" y="0" width="512" height="512" rx="88" fill="#000"/>

  <!-- ascending bars motif (3 white bars, short → tall, left to right) -->
  <rect x="86"  y="270" width="46" height="92"  rx="6" fill="#ffffff"/>
  <rect x="148" y="222" width="46" height="140" rx="6" fill="#ffffff"/>
  <rect x="210" y="158" width="46" height="204" rx="6" fill="#ffffff"/>

  <!-- "IC" letters (mixed white/IC-green to mirror the IC Markets balance) -->
  <text x="278" y="262"
        font-family="Arial, Helvetica, system-ui, sans-serif"
        font-weight="900" font-size="184"
        letter-spacing="-6"
        fill="#ffffff">I<tspan fill="#00d75d">C</tspan></text>

  <!-- "Trading" wordmark below -->
  <text x="84" y="408"
        font-family="Arial, Helvetica, system-ui, sans-serif"
        font-weight="800" font-size="112"
        letter-spacing="-2"
        fill="#ffffff">Trading</text>
</svg>
